<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1160 920" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="aG" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#15803D"/></marker>
    <marker id="aR" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#DC2626"/></marker>
    <marker id="aA" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#B8860B"/></marker>
    <marker id="aT" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#0D9488"/></marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0B3A22" flood-opacity="0.16"/></filter>
  </defs>

  <rect x="0" y="0" width="1160" height="920" fill="#F6FAF7"/>
  <text x="580" y="44" text-anchor="middle" font-size="27" font-weight="700" fill="#0E1F15">Dictionary Mobile App — Data Flow</text>
  <text x="580" y="70" text-anchor="middle" font-size="13.5" fill="#566B5D">From keystroke to rendered definition, including every validation, error and retry branch</text>

  <!-- LEGEND (top-right) -->
  <rect x="864" y="92" width="270" height="150" rx="12" fill="#FFFFFF" stroke="#D6E6DA" filter="url(#sh)"/>
  <text x="884" y="116" font-size="12.5" font-weight="800" fill="#0E1F15">Legend</text>
  <rect x="884" y="128" width="22" height="14" rx="4" fill="#FFFFFF" stroke="#15803D"/><text x="914" y="139" font-size="11.5" fill="#3F5447">Process / action</text>
  <polygon points="895,156 906,163 895,170 884,163" fill="#E4F1EA" stroke="#0D9488"/><text x="914" y="167" font-size="11.5" fill="#3F5447">Decision</text>
  <rect x="884" y="180" width="22" height="14" rx="7" fill="#E7F3EB" stroke="#15803D"/><text x="914" y="191" font-size="11.5" fill="#3F5447">Start / End</text>
  <rect x="884" y="204" width="22" height="14" rx="4" fill="#FDECEC" stroke="#DC2626"/><text x="914" y="215" font-size="11.5" fill="#3F5447">Error path</text>
  <rect x="884" y="222" width="22" height="14" rx="4" fill="#FBF1D8" stroke="#B8860B"/><text x="914" y="233" font-size="11.5" fill="#3F5447">Retry / transient</text>

  <!-- 1. START -->
  <rect x="240" y="92" width="240" height="46" rx="23" fill="#E7F3EB" stroke="#15803D" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360" y="120" text-anchor="middle" font-size="13" font-weight="700" fill="#0E1F15">User types a word &amp; taps Search</text>
  <line x1="360" y1="138" x2="360" y2="165" stroke="#15803D" stroke-width="2" marker-end="url(#aG)"/>

  <!-- 2. DECISION valid? -->
  <polygon points="360,166 468,206 360,246 252,206" fill="#E4F1EA" stroke="#0D9488" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360" y="202" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E1F15">Input valid?</text>
  <text x="360" y="219" text-anchor="middle" font-size="9.5" fill="#566B5D">empty/word/numbers/symbols</text>

  <!-- No -> validation message -->
  <line x1="252" y1="206" x2="222" y2="206" stroke="#DC2626" stroke-width="2" marker-end="url(#aR)"/>
  <rect x="40" y="184" width="180" height="44" rx="10" fill="#FDECEC" stroke="#DC2626" filter="url(#sh)"/>
  <text x="130" y="206" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0E1F15">Show validation</text>
  <text x="130" y="221" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0E1F15">message</text>
  <text x="234" y="199" text-anchor="middle" font-size="10.5" fill="#DC2626">No</text>
  <path d="M130,184 C130,150 150,123 238,118" fill="none" stroke="#DC2626" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#aR)"/>

  <!-- Yes down -->
  <line x1="360" y1="246" x2="360" y2="272" stroke="#15803D" stroke-width="2" marker-end="url(#aG)"/>
  <text x="372" y="263" font-size="10.5" fill="#15803D">Yes</text>

  <!-- 3. search() -->
  <rect x="240" y="272" width="240" height="46" rx="11" fill="#FFFFFF" stroke="#15803D" stroke-width="1.4" filter="url(#sh)"/>
  <text x="360" y="293" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E1F15">search()  ·  context</text>
  <text x="360" y="309" text-anchor="middle" font-size="10.5" fill="#566B5D">loading = true · error = null</text>
  <line x1="360" y1="318" x2="360" y2="344" stroke="#15803D" stroke-width="2" marker-end="url(#aG)"/>

  <!-- 4. axios GET -->
  <rect x="240" y="344" width="240" height="46" rx="11" fill="#FFFFFF" stroke="#15803D" stroke-width="1.4" filter="url(#sh)"/>
  <text x="360" y="365" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E1F15">axios GET</text>
  <text x="360" y="381" text-anchor="middle" font-size="10.5" fill="#566B5D">…/entries/en/{word}</text>
  <line x1="360" y1="390" x2="360" y2="416" stroke="#15803D" stroke-width="2" marker-end="url(#aG)"/>

  <!-- 5. DECISION response? -->
  <polygon points="360,416 478,460 360,504 242,460" fill="#E4F1EA" stroke="#0D9488" stroke-width="1.5" filter="url(#sh)"/>
  <text x="360" y="458" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E1F15">API response?</text>
  <text x="360" y="475" text-anchor="middle" font-size="9.5" fill="#566B5D">status / body</text>

  <!-- 404 branch -->
  <line x1="478" y1="448" x2="556" y2="430" stroke="#DC2626" stroke-width="2" marker-end="url(#aR)"/>
  <text x="505" y="430" font-size="10.5" fill="#DC2626">404</text>
  <rect x="558" y="408" width="252" height="44" rx="10" fill="#FDECEC" stroke="#DC2626" filter="url(#sh)"/>
  <text x="684" y="435" text-anchor="middle" font-size="12" font-weight="700" fill="#0E1F15">"Word not found" message</text>

  <!-- transient branch -->
  <line x1="478" y1="472" x2="556" y2="505" stroke="#B8860B" stroke-width="2" marker-end="url(#aA)"/>
  <text x="498" y="503" font-size="10" fill="#B8860B">429 / 5xx / net</text>
  <rect x="558" y="486" width="252" height="50" rx="10" fill="#FBF1D8" stroke="#B8860B" filter="url(#sh)"/>
  <text x="684" y="508" text-anchor="middle" font-size="12" font-weight="700" fill="#0E1F15">Transient error</text>
  <text x="684" y="524" text-anchor="middle" font-size="10.5" fill="#7A5B00">auto-retry ×2 (backoff)</text>
  <!-- retry loops back to axios -->
  <path d="M558,500 C512,490 512,400 482,372" fill="none" stroke="#B8860B" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#aA)"/>
  <text x="520" y="430" font-size="10.5" fill="#B8860B" transform="rotate(-90 520 430)">retry</text>

  <!-- 200 down -->
  <line x1="360" y1="504" x2="360" y2="530" stroke="#15803D" stroke-width="2" marker-end="url(#aG)"/>
  <text x="372" y="521" font-size="10.5" fill="#15803D">200 + JSON array</text>

  <!-- 6. normalize -->
  <rect x="212" y="530" width="296" height="48" rx="11" fill="#FFFFFF" stroke="#15803D" stroke-width="1.4" filter="url(#sh)"/>
  <text x="360" y="550" text-anchor="middle" font-size="12" font-weight="700" fill="#0E1F15">normalize()  ·  parse + clean</text>
  <text x="360" y="566" text-anchor="middle" font-size="10" fill="#566B5D">{ word · phonetic · audios[] · meanings · syn/ant }</text>
  <line x1="360" y1="578" x2="360" y2="602" stroke="#15803D" stroke-width="2" marker-end="url(#aG)"/>

  <!-- 7. store + history -->
  <rect x="230" y="602" width="260" height="48" rx="11" fill="#FFFFFF" stroke="#15803D" stroke-width="1.4" filter="url(#sh)"/>
  <text x="360" y="622" text-anchor="middle" font-size="12" font-weight="700" fill="#0E1F15">store currentEntry</text>
  <text x="360" y="638" text-anchor="middle" font-size="10.5" fill="#566B5D">addToHistory (no duplicates)</text>
  <!-- persist to AsyncStorage -->
  <line x1="230" y1="626" x2="212" y2="626" stroke="#0D9488" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#aT)"/>
  <rect x="40" y="603" width="170" height="46" rx="10" fill="#E4F1EA" stroke="#0D9488" filter="url(#sh)"/>
  <text x="125" y="624" text-anchor="middle" font-size="11.5" font-weight="700" fill="#0E1F15">AsyncStorage</text>
  <text x="125" y="639" text-anchor="middle" font-size="10" fill="#566B5D">persist history + theme</text>
  <line x1="360" y1="650" x2="360" y2="674" stroke="#15803D" stroke-width="2" marker-end="url(#aG)"/>

  <!-- 8. loading false -->
  <rect x="278" y="674" width="164" height="40" rx="11" fill="#FFFFFF" stroke="#15803D" stroke-width="1.4" filter="url(#sh)"/>
  <text x="360" y="699" text-anchor="middle" font-size="12" font-weight="700" fill="#0E1F15">loading = false</text>
  <line x1="360" y1="714" x2="360" y2="738" stroke="#15803D" stroke-width="2" marker-end="url(#aG)"/>

  <!-- 9. navigate -->
  <rect x="262" y="738" width="196" height="42" rx="11" fill="#FFFFFF" stroke="#15803D" stroke-width="1.4" filter="url(#sh)"/>
  <text x="360" y="764" text-anchor="middle" font-size="12" font-weight="700" fill="#0E1F15">router.push('/details')</text>
  <line x1="360" y1="780" x2="360" y2="804" stroke="#15803D" stroke-width="2" marker-end="url(#aG)"/>

  <!-- 10. terminal render -->
  <rect x="206" y="804" width="308" height="80" rx="14" fill="#E7F3EB" stroke="#15803D" stroke-width="1.6" filter="url(#sh)"/>
  <text x="360" y="830" text-anchor="middle" font-size="13" font-weight="800" fill="#15803D">DETAILS SCREEN RENDERS</text>
  <text x="360" y="850" text-anchor="middle" font-size="10.5" fill="#3F5447">word · phonetic · audio (play / pause / stop)</text>
  <text x="360" y="866" text-anchor="middle" font-size="10.5" fill="#3F5447">meanings · examples · synonyms / antonyms</text>

  <!-- audio note -->
  <rect x="558" y="804" width="302" height="80" rx="12" fill="#FFFFFF" stroke="#D6E6DA" filter="url(#sh)"/>
  <text x="709" y="828" text-anchor="middle" font-size="12" font-weight="700" fill="#0E1F15">Audio (expo-audio)</text>
  <text x="709" y="847" text-anchor="middle" font-size="10.5" fill="#566B5D">SpeakerButton: play · pause · stop</text>
  <text x="709" y="864" text-anchor="middle" font-size="10.5" fill="#566B5D">multiple pronunciations (US/UK) · hidden if none</text>
  <line x1="514" y1="844" x2="556" y2="844" stroke="#15803D" stroke-width="1.8" marker-end="url(#aG)"/>

  <!-- ERROR node -->
  <rect x="558" y="600" width="252" height="74" rx="12" fill="#FDECEC" stroke="#DC2626" stroke-width="1.5" filter="url(#sh)"/>
  <text x="684" y="626" text-anchor="middle" font-size="13" font-weight="800" fill="#B91C1C">Error card + Retry</text>
  <text x="684" y="646" text-anchor="middle" font-size="10.5" fill="#3F5447">loading hidden · app never crashes</text>
  <text x="684" y="662" text-anchor="middle" font-size="10.5" fill="#3F5447">user can retry the search</text>
  <!-- 404 -> error -->
  <line x1="660" y1="452" x2="660" y2="600" stroke="#DC2626" stroke-width="1.6" marker-end="url(#aR)"/>
  <!-- transient still-failing -> error -->
  <line x1="715" y1="536" x2="715" y2="600" stroke="#B8860B" stroke-width="1.6" marker-end="url(#aR)"/>
  <text x="745" y="572" font-size="10" fill="#B8860B">still failing</text>
  <!-- error retry -> search() -->
  <path d="M558,620 C520,560 520,300 482,290" fill="none" stroke="#DC2626" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#aR)"/>
  <text x="534" y="455" font-size="10.5" fill="#DC2626" transform="rotate(-90 534 455)">Retry</text>

  <!-- HISTORY REUSE -->
  <rect x="864" y="270" width="270" height="58" rx="12" fill="#E4F1EA" stroke="#0D9488" stroke-width="1.5" filter="url(#sh)"/>
  <text x="999" y="294" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0E1F15">Drawer: tap a history word</text>
  <text x="999" y="313" text-anchor="middle" font-size="10.5" fill="#566B5D">re-runs the same search() flow</text>
  <path d="M864,292 C620,292 540,290 482,290" fill="none" stroke="#0D9488" stroke-width="1.8" marker-end="url(#aT)"/>
  <text x="690" y="284" text-anchor="middle" font-size="10.5" fill="#0D7E74">re-search</text>
</svg>
