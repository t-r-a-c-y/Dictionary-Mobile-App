<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 880" font-family="Segoe UI, Roboto, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#15803D"/>
    </marker>
    <marker id="arrowL" markerWidth="12" markerHeight="12" refX="8" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#0D9488"/>
    </marker>
    <marker id="arrowS" markerWidth="12" markerHeight="12" refX="1" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M9,0 L0,4 L9,8 Z" fill="#0D9488"/>
    </marker>
    <filter id="sh" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0B3A22" flood-opacity="0.16"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1140" height="880" fill="#F6FAF7"/>

  <!-- Title -->
  <text x="570" y="46" text-anchor="middle" font-size="27" font-weight="700" fill="#0E1F15">Dictionary Mobile App — System Architecture</text>
  <text x="570" y="73" text-anchor="middle" font-size="13.5" fill="#566B5D">Cross-platform (Android · iOS · Web) · Expo SDK 54 · Expo Router · Axios · expo-audio · AsyncStorage</text>

  <!-- ============ PRESENTATION LAYER ============ -->
  <rect x="60" y="100" width="700" height="178" rx="16" fill="#E7F3EB" stroke="#15803D" stroke-width="1.5" filter="url(#sh)"/>
  <text x="82" y="128" font-size="14" font-weight="800" fill="#15803D">①  PRESENTATION LAYER  ·  app/ + components/</text>

  <g filter="url(#sh)">
    <rect x="82" y="142" width="210" height="74" rx="11" fill="#FFFFFF" stroke="#CFE6D7"/>
    <text x="187" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#0E1F15">Search Screen</text>
    <text x="187" y="192" text-anchor="middle" font-size="11.5" fill="#566B5D">app/index.js  ·  route "/"</text>
  </g>
  <g filter="url(#sh)">
    <rect x="305" y="142" width="210" height="74" rx="11" fill="#FFFFFF" stroke="#CFE6D7"/>
    <text x="410" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#0E1F15">Details Screen</text>
    <text x="410" y="192" text-anchor="middle" font-size="11.5" fill="#566B5D">app/details.js  ·  "/details"</text>
  </g>
  <g filter="url(#sh)">
    <rect x="528" y="142" width="210" height="74" rx="11" fill="#FFFFFF" stroke="#CFE6D7"/>
    <text x="633" y="172" text-anchor="middle" font-size="14" font-weight="700" fill="#0E1F15">Drawer + History</text>
    <text x="633" y="192" text-anchor="middle" font-size="11.5" fill="#566B5D">HistoryDrawerContent</text>
  </g>
  <text x="82" y="248" font-size="11.5" fill="#3F5447">Reusable UI →  SearchBar · Loader · ErrorView · MeaningCard · SpeakerButton · ConfirmModal</text>
  <text x="82" y="266" font-size="11.5" fill="#3F5447">Navigation shell →  app/_layout.js  (Drawer navigator · themed headers · theme toggle)</text>

  <!-- arrow Presentation -> State -->
  <line x1="410" y1="278" x2="410" y2="312" stroke="#15803D" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="300" font-size="11.5" fill="#566B5D">reads state · calls search()</text>

  <!-- ============ STATE LAYER ============ -->
  <rect x="60" y="312" width="700" height="116" rx="16" fill="#E4F1EA" stroke="#0D9488" stroke-width="1.5" filter="url(#sh)"/>
  <text x="82" y="340" font-size="14" font-weight="800" fill="#0D7E74">②  STATE LAYER  ·  context/  (React Context — single source of truth)</text>
  <g filter="url(#sh)">
    <rect x="82" y="354" width="430" height="58" rx="11" fill="#FFFFFF" stroke="#CDE8E4"/>
    <text x="297" y="378" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0E1F15">HistoryContext</text>
    <text x="297" y="397" text-anchor="middle" font-size="11" fill="#566B5D">history · currentEntry · loading · error · search() · add/remove/clear</text>
  </g>
  <g filter="url(#sh)">
    <rect x="525" y="354" width="213" height="58" rx="11" fill="#FFFFFF" stroke="#CDE8E4"/>
    <text x="631" y="378" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0E1F15">ThemeContext</text>
    <text x="631" y="397" text-anchor="middle" font-size="11" fill="#566B5D">light / dark palette · toggle</text>
  </g>

  <!-- arrow State -> Service -->
  <line x1="410" y1="428" x2="410" y2="462" stroke="#15803D" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="450" font-size="11.5" fill="#566B5D">fetchWord(word)</text>

  <!-- ============ SERVICE LAYER ============ -->
  <rect x="60" y="462" width="700" height="96" rx="16" fill="#E7F3EB" stroke="#15803D" stroke-width="1.5" filter="url(#sh)"/>
  <text x="82" y="490" font-size="14" font-weight="800" fill="#15803D">③  SERVICE LAYER  ·  services/</text>
  <g filter="url(#sh)">
    <rect x="82" y="502" width="656" height="44" rx="11" fill="#FFFFFF" stroke="#CFE6D7"/>
    <text x="410" y="529" text-anchor="middle" font-size="12.5" font-weight="600" fill="#0E1F15">dictionaryApi.js  —  axios GET  ·  normalize()  ·  retry + backoff  ·  ApiError mapping</text>
  </g>

  <!-- arrow Service -> External -->
  <line x1="410" y1="558" x2="410" y2="592" stroke="#15803D" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="420" y="580" font-size="11.5" fill="#566B5D">HTTPS GET  (auto-retry on rate-limit / 5xx / network)</text>

  <!-- ============ EXTERNAL ============ -->
  <rect x="60" y="592" width="700" height="78" rx="16" fill="#ECEFF3" stroke="#5B6B82" stroke-width="1.5" filter="url(#sh)"/>
  <text x="82" y="620" font-size="14" font-weight="800" fill="#41506A">④  EXTERNAL API  (3rd-party)</text>
  <text x="82" y="648" font-size="12.5" font-weight="600" fill="#0E1F15">Free Dictionary API — https://api.dictionaryapi.dev/api/v2/entries/en/{word}</text>

  <!-- response return arrow (left margin, dashed, going up) -->
  <path d="M60,631 C28,631 28,383 60,383" fill="none" stroke="#0D9488" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#arrowL)"/>
  <text x="20" y="510" font-size="11.5" fill="#0D7E74" transform="rotate(-90 20 510)">JSON array  →  normalized entry  →  currentEntry</text>

  <!-- ============ SIDE COLUMN ============ -->
  <!-- Utils / validation -->
  <g filter="url(#sh)">
    <rect x="800" y="142" width="278" height="74" rx="12" fill="#FFFFFF" stroke="#CFE6D7"/>
    <text x="939" y="170" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0E1F15">utils/validation.js</text>
    <text x="939" y="190" text-anchor="middle" font-size="11" fill="#566B5D">empty · sentence · numbers · symbols · 1-letter</text>
  </g>
  <line x1="800" y1="179" x2="762" y2="179" stroke="#0D9488" stroke-width="2" marker-end="url(#arrowL)"/>
  <text x="788" y="133" text-anchor="middle" font-size="10.5" fill="#0D7E74">validates input</text>

  <!-- AsyncStorage -->
  <g filter="url(#sh)">
    <rect x="800" y="330" width="278" height="82" rx="12" fill="#FFFFFF" stroke="#CDE8E4"/>
    <text x="939" y="360" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0E1F15">AsyncStorage</text>
    <text x="939" y="380" text-anchor="middle" font-size="11" fill="#566B5D">utils/storage.js</text>
    <text x="939" y="398" text-anchor="middle" font-size="11" fill="#566B5D">persists history + theme (survives restart)</text>
  </g>
  <line x1="800" y1="371" x2="762" y2="371" stroke="#0D9488" stroke-width="2" marker-start="url(#arrowS)" marker-end="url(#arrowL)"/>
  <text x="781" y="424" text-anchor="middle" font-size="10.5" fill="#0D7E74">load / save</text>

  <!-- Constants -->
  <g filter="url(#sh)">
    <rect x="800" y="490" width="278" height="74" rx="12" fill="#FFFFFF" stroke="#CFE6D7"/>
    <text x="939" y="518" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0E1F15">constants/</text>
    <text x="939" y="538" text-anchor="middle" font-size="11" fill="#566B5D">colors.js (theme) · config.js (API URL · timeout · retries)</text>
  </g>
  <line x1="800" y1="527" x2="762" y2="527" stroke="#0D9488" stroke-width="2" marker-end="url(#arrowL)"/>

  <!-- ============ LEGEND + EXPLANATION ============ -->
  <rect x="60" y="706" width="1018" height="146" rx="16" fill="#FFFFFF" stroke="#D6E6DA" filter="url(#sh)"/>
  <text x="82" y="734" font-size="14" font-weight="800" fill="#0E1F15">How the layers work together</text>

  <circle cx="92" cy="760" r="7" fill="#15803D"/>
  <text x="106" y="765" font-size="12" fill="#3F5447"><tspan font-weight="700">① Presentation</tspan> — screens &amp; reusable components capture input and render results. No direct network calls.</text>

  <circle cx="92" cy="786" r="7" fill="#0D9488"/>
  <text x="106" y="791" font-size="12" fill="#3F5447"><tspan font-weight="700">② State</tspan> — Context is the single source of truth; orchestrates search(), holds the current word, history, loading &amp; error.</text>

  <circle cx="92" cy="812" r="7" fill="#15803D"/>
  <text x="106" y="817" font-size="12" fill="#3F5447"><tspan font-weight="700">③ Service</tspan> — wraps axios; builds the URL, parses/normalizes the response, retries transient failures, maps errors to friendly text.</text>

  <circle cx="92" cy="838" r="7" fill="#5B6B82"/>
  <text x="106" y="843" font-size="12" fill="#3F5447"><tspan font-weight="700">④ External API</tspan> — the free dictionary service. Side modules: validation (input), AsyncStorage (persistence), constants (config).</text>
</svg>
